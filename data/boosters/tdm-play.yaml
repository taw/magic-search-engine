# Lorwyn Eclipsed
# Play Booster
# Sources:
# - https://magic.wizards.com/en/news/feature/collecting-tarkir-dragonstorm
# - https://magic.wizards.com/en/products/tarkir-dragonstorm/card-image-gallery
# - https://scryfall.com/sets/tdm
# - https://scryfall.com/sets/spg

superfilter: "-is:reversibleback"
pack:
  common_special_guest:
    - common: 7
      chance: 63
    - common: 6
      special_guest: 1
      chance: 1
  uncommon: 3
  wildcard: 1
  rare_mythic_boosterfun: 1
  foil: 1
  land:
    - non_foil_land: 1
      chance: 80
    - foil_land: 1
      chance: 20

queries:
  dual_land: "e:{set} t:land r:c -t:basic -wilds"
  presence_land: "e:{set} number:272-276"
  basic_land: "e:{set} number:277-286"
  draconic: "e:{set} number:292-326"
  clan: "e:{set} number: 327-376"
  reversible_dragon: "e:{set} number: 377-382"
  borderless_saga_siege: "e:{set} number: 383-398"
  boosterfun: "{draconic} or {clan} or {reversible_dragon} or {borderless_saga_siege}"

sheets:
  common:
    query: "r:c -{dual_land} -t:basic"
    count: 81

  boosterfun:
  # Assumes all boosterfun use 2:1 M:R ratio
    any:
    - rawquery: "{boosterfun} r:c" # Common Dranoic Frame
      rate: 18 # 
      count: 6
    - rawquery: "{boosterfun} r:u" # Uncommon Dranoic Frame
      rate: 6 # 
      count: 15
    - rawquery: "{boosterfun} r:r"
      rate: 2
      count: 61
    - rawquery: "{boosterfun} r:m"
      rate: 1
      count: 25

  boosterfun_r_m:
    any:
    - rawquery: "{boosterfun} r:r"
      rate: 2
    - rawquery: "{boosterfun} r:m"
      rate: 1

  wildcard:
    any:
      - use: common
        chance: 125 # 12.5%
        count: 81
      - use: uncommon
        chance: 583  # 58.3%
        count: 100
      - use: rare_mythic
        chance: 182 # 15.6% + 2.6% = 18.2%
        count: 80
      - use: boosterfun
        chance: 110 # 100% - 12.5% - 58.3% - 18.2% = 11%

  rare_mythic_boosterfun:
    any:
      - use: rare_mythic
        chance: 875 # 75 + 12.5% = 87.5%
      - use: boosterfun_r_m
        chance: 125 # 100% - 87.5% = 12.5%

  foil:
    foil: true
    any:
      - use: common
        chance: 565 # 56.5%
      - use: uncommon
        chance: 320 # 32%
      - use: rare_mythic
        chance: 75 # 6.4% + 1.1% = 7.5%
      - use: boosterfun
        chance: 40 # 100% - 56.5% - 32% - 7.5% = 4%

  non_foil_land:
    any:
      - query: "{basic_land}"
        count: 10
        rate: 1
      - query: "{presence_land}"
        count: 5
        rate: 1
      - query: "{dual_land}"
        count: 10
        rate: 10
      
  foil_land:
    foil: true
    use: non_foil_land

  special_guest:
    set: spg
    code: "TDM"
