# Final Fantasy Chocobo Bundle
# Data from: https://magic.wizards.com/en/news/feature/collecting-final-fantasy
# And: https://wpn.wizards.com/en/products/final-fantasy
#
# FULL PRODUCT CONTENTS:
#   - 10 Final Fantasy Play Boosters (modeled by fin-play.yaml)
#   - 1 Chocobo Booster (12 cards):
#       - 10 Chocobo Track Foil basic lands (2 of each type, FIC #478-482)
#       - 2 of 20 Borderless Chocobo Bundle cards (equal rates, Chocobo Track Foil)
#         FIN #564-571 (8 from main set) + FIC #466-477 (12 from commander)
#   - 1 Traditional Foil alt-art Paradise Chocobo promo (FIC #483, fixed)
#   - 1 of 24 Borderless Scene Cards (FIC #442-465, non-foil, equal rates)
#   - 32 Landmark Full-Art Basic Lands (16 foil + 16 non-foil, fixed set)
#   - Click Wheel life counter and Chocobo Edition card box (non-card items, not modeled)
#
# SEALED COMPOSITION:
#   The complete bundle is opened as: 10xfin-play + 1xfin-chocobo-bundle
#   e.g. Sealed.new(db, "10xfin-play", "fin-chocobo-bundle")
#
# NOTES:
#   - Chocobo Track Foil basics use two fixed sheets of 5 to guarantee exactly
#     2 of each basic land type (Plains, Island, Swamp, Mountain, Forest).
#   - Landmark lands use fixed: true to bypass name dedup, ensuring all 16 unique
#     prints are included (3 Plains, 3 Islands, 3 Swamps, 3 Mountains, 3 Forests, 1 Wastes).
#   - All 20 borderless Chocobo Bundle cards appear at equal rates per WotC.
#   - Paradise Chocobo (reskinned Birds of Paradise) is always the same card.
#   - Scene cards are the same 24 available in the 4 Scene Boxes (FIC #442-465).

name: "{set_name} Chocobo Bundle"
pack:
  # --- Chocobo Booster (12 cards) ---
  chocobo_basic_a: 5
  chocobo_basic_b: 5
  borderless_chocobo: 2
  # --- Bundle extras ---
  promo: 1
  scene_card: 1
  landmark_land: 16
  foil_landmark_land: 16

sheets:
  # Chocobo Booster: 10 Chocobo Track Foil basics (2 of each type)
  # Two fixed sheets of 5 guarantees exactly one of each basic per sheet,
  # totaling 2 Plains, 2 Islands, 2 Swamps, 2 Mountains, 2 Forests.
  chocobo_basic_a:
    fixed: true
    foil: true
    rawquery: "e:fic number:478-482"
    count: 5

  chocobo_basic_b:
    fixed: true
    foil: true
    use: chocobo_basic_a

  # Chocobo Booster: 2 of 20 Borderless Chocobo Bundle cards
  # All at equal rates, all Chocobo Track Foil.
  # 8 from FIN main set (#564-571) + 12 from FIC commander (#466-477)
  borderless_chocobo:
    foil: true
    rawquery: "(e:fin number:564-571) or (e:fic number:466-477)"
    count: 20

  # 1 Traditional Foil Paradise Chocobo promo (reskinned Birds of Paradise)
  # Always the same card - FIC #483
  promo:
    fixed: true
    foil: true
    rawquery: "e:fic number:483"
    count: 1

  # 1 of 24 Borderless Scene Cards (non-foil, equal rates)
  # Same cards available in the 4 Scene Boxes
  scene_card:
    rawquery: "e:fic number:442-465"
    count: 24

  # 16 Landmark Full-Art Basic Lands (non-foil)
  # Fixed set: one of each of the 16 landscapes (one per mainline FF game)
  # 3 Plains + 3 Islands + 3 Swamps + 3 Mountains + 3 Forests + 1 Wastes
  # Uses fixed: true to bypass name dedup and include all 16 unique prints
  landmark_land:
    fixed: true
    rawquery: "e:fin number:294-309"
    count: 16

  # 16 Landmark Full-Art Basic Lands (traditional foil)
  # Same 16 cards as above, in foil
  foil_landmark_land:
    fixed: true
    foil: true
    use: landmark_land