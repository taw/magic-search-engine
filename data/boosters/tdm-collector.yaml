# Tarkir: Dragonstorm
# Collector Booster
# Sources:
# - https://magic.wizards.com/en/news/feature/collecting-tarkir-dragonstorm
# - https://magic.wizards.com/en/products/tarkir-dragonstorm/card-image-gallery
# - https://scryfall.com/sets/tdm
# - https://scryfall.com/sets/tdc
# - https://scryfall.com/sets/spg

superfilter: "-is:reversibleback"
pack:
  foil_common: 4
  foil_uncommon: 3
  non_foil_draconic_c_u: 1
  foil_draconic_c_u: 1
  land:
  - non_foil_basic: 1
    chance: 167
  - foil_basic: 1
    chance: 833
  foil_rare_mythic: 1
  commander: 1
  booster_fun: 2
  foil_booster_fun: 1
queries:
  presence_basic: "e:{set} number:272-276"
  dragons_eye_basic: "e:{set} number:287-291"
  draconic_showcase: "e:{set} number:292-326"
  clan_card: "e:{set} number:327-376"
  reversible_dragons: "e:{set} number:377-382"
  borderless_alternate_art: "e:{set} number:383-398"
  ghostfire: "e:{set} number:399-408"
  halo_foil_ghostfire: "e:{set} number:409-418"
  serialized_mox: "e:{set} number:419"

sheets:
  non_foil_draconic_c_u:
    any:
    - rawquery: "{draconic_showcase} r:c"
      chance: 546
    - rawquery: "{draconic_showcase} r:u"
      chance: 454
  foil_draconic_c_u:
    foil: true
    use: non_foil_draconic_c_u
  non_foil_basic:
    rawquery: "{dragons_eye_basic}"
  foil_basic:
    foil: true
    any:
    - rawquery: "{dragons_eye_basic}"
      chance: 11
    - rawquery: "{presence_basic}"
      chance: 100
  foil_rare_mythic:
    foil: true
    use: rare_mythic
  commander:
    any:
    - rawquery: "e:tdc number:1-10"
      rate: 1
    - rawquery: "e:tdc number:51-90"
      rate: 2
  booster_fun:
    any:
    - rawquery: "{draconic_showcase} r:r"
      chance: 64
    - rawquery: "{draconic_showcase} r:m"
      chance: 46
    - rawquery: "{clan_card} r:r"
      chance: 515
    - rawquery: "{clan_card} r:m"
      chance: 82
    - rawquery: "{borderless_alternate_art} r:r"
      chance: 215
    - rawquery: "{borderless_alternate_art} r:m"
      chance: 7
    - rawquery: "{reversible_dragons} r:r"
      chance: 64
    - rawquery: "{reversible_dragons} r:m"
      chance: 7
  foil_booster_fun:
    foil: true
    any:
    - rawquery: "{draconic_showcase} r:r"
      chance: 530
    - rawquery: "{draconic_showcase} r:m"
      chance: 390
    - rawquery: "{clan_card} r:r"
      chance: 4270
    - rawquery: "{clan_card} r:m"
      chance: 680
    - rawquery: "{borderless_alternate_art} r:r"
      chance: 1780
    - rawquery: "{borderless_alternate_art} r:m"
      chance: 60
    - rawquery: "{reversible_dragons} r:r"
      chance: 530
    - rawquery: "{reversible_dragons} r:m"
      chance: 60
    - rawquery: "{ghostfire}"
      chance: 900
    - rawquery: "{halo_foil_ghostfire}"
      chance: 100
    - set: spg
      code: "TDM"
      chance: 600
    - rawquery: "e:spg number:114-118"
      chance: 100
    - rawquery: "{serialized_mox}"
      chance: 2
      count: 1


########## foil_boosterfun sheet:
# Best guessed by Koda
# 1 Serialized Double Rainbow Foil Mox Jasper every 5000 boosters -> 0.02% of boosters. 