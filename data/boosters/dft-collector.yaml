# Data from https://magic.wizards.com/en/news/feature/collecting-aetherdrift
pack:
  foil_common: 4
  foil_uncommon: 3
  foil_driver_seat_land: 1
  revved_up_cu: 1
  foil_revved_up_cu: 1
  foil_rare_mythic: 1
  commander:
    - showcase_commander: 1
      chance: 379
    - foil_showcase_commander: 1
      chance: 21
  booster_fun: 2
  foil_booster_fun: 1
queries:
  driver_basic: "e:{set} number:272-276"
  revved_up: "e:{set} number:292-332"
  rude_riders: "e:{set} number:333-346"
  grafitti_giants: "e:{set} number:347-354"
  borderless_rare: "e:{set} number: 355-375"
  serialized_aetherspark: "e:{set} number:376"
  extended_art: "e:{set} number: 377-396"
  jp_showcase: "e:{set} number:397-406"
  fracture_foil: "e:{set} number:407-416"
  boosterfun: "{revved_up} or {rude_riders} or {grafitti_giants} or {borderless_rare} or {extended_art}"
sheets:
  foil_driver_seat_land:
    foil: true
    query: "{driver_basic}"
  revved_up_cu:
    any:
    - rawquery: "{revved_up} r:c"
      chance: 15
    - rawquery: "{revved_up} r:u"
      chance: 17
  foil_revved_up_cu:
    foil: true
    use: revved_up_cu
  foil_rare_mythic:
    foil: true
    use: rare_mythic
  showcase_commander:
    any:
    - rawquery: "e:drc number<=4"
      rate: 1
    - rawquery: "e:drc frame:extendedart"
      rate: 2
  foil_showcase_commander:
    foil: true
    rawquery: "e:drc number<=4"
  booster_fun:
    any:
    - rawquery: "{boosterfun} r:r"
      rate: 2
    - rawquery: "{boosterfun} r:m"
      rate: 1
  foil_booster_fun:
    foil: true
    any:
    - rawquery: "{boosterfun} r:r"
      chance: 7460
    - rawquery: "{boosterfun} r:m"
      chance: 1120
    - rawquery: "{jp_showcase}"
      chance: 900
    - rawquery: "{fracture_foil}"
      chance: 100
    - set: spg
      code: "DFT"
      chance: 420
    - rawquery: "{serialized_aetherspark}"
      chance: 2

########## foil_booster_fun sheet:
# Best guessed by Koda
# 1 Serialized Double Rainbow Foil Aetherspark every 5000 boosters -> 0.02% of boosters.